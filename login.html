<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="icon" type="image/png" href="icon_dm.png">

<style>

/* GLOBAL */
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:linear-gradient(135deg,#0d6efd,#4dabf7);
}

/* CARD */
.login-card{
  background:white;
  padding:30px 25px;
  border-radius:20px;
  width:320px;

  box-shadow:0 15px 40px rgba(0,0,0,0.2);

  animation:fadeIn 0.5s ease;
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:15px;
}

.logo img{
  width:120px;
}

.logo h2{
  margin:5px 0 0;
  font-size:18px;
}

/* TITLE */
h3{
  text-align:center;
  margin-bottom:20px;
}

/* INPUT */
.input-group{
  position:relative;
  margin-bottom:15px;
}

.input-group input{
  width:100%;
  padding:12px 12px;
  border-radius:12px;
  border:1px solid #ddd;
  outline:none;
  font-size:16px;
  transition:0.2s;
}

.input-group input:focus{
  border-color:#0d6efd;
  box-shadow:0 0 0 2px rgba(13,110,253,0.1);
  font-size:16px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#0d6efd;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#0b5ed7;
}

button:active{
  transform:scale(0.97);
}

/* LOADING */
.loading{
  opacity:0.7;
  pointer-events:none;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#333;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.toast.error{background:#dc3545;}
.toast.success{background:#198754;}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="login-card">

  <div class="logo">
    <img src="logo.jpg">
    <!-- <h2>Dia Maika</h2> -->
  </div>

  <h3>Login</h3>

  <div class="input-group">
    <input type="text" id="username" placeholder="👤 Utilisateur">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="🔒 Mot de passe">
  </div>

  <button id="loginBtn" onclick="login()">Se connecter</button>

</div>

<div id="toast" class="toast"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbws46prbkUdKw8OSrzX3PwICO93NzViSaii9oHU-YcquZ6vANDzxojFh1BPpwvNirK5/exec";

function showToast(message,type="error"){
  const t = document.getElementById("toast");
  t.className = "toast show " + type;
  t.innerText = message;

  setTimeout(()=> t.className="toast",3000);
}

async function login(){

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const btn = document.getElementById("loginBtn");

  if(!username || !password){
    showToast("Remplis tous les champs","error");
    return;
  }

  btn.innerText = "⏳ Connexion...";
  btn.classList.add("loading");

  try{

    const res = await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        action:"adminLogin",
        username: username,
        password: password
      })
    });

    const data = await res.json();

    if(data.status === "success"){

      localStorage.setItem("admin_session", data.sessionToken);

      showToast("Connexion réussie","success");

      setTimeout(()=>{
        window.location.href = "index.html";
      },800);

    }else{
      showToast("Login incorrect ❌","error");
    }

  }catch(e){
    showToast("Erreur serveur ❌","error");
  }

  btn.innerText = "Se connecter";
  btn.classList.remove("loading");
}

// 🔐 déjà connecté
if(localStorage.getItem("admin_session")){
  window.location.href = "index.html";
}

</script>

</body>
</html>
